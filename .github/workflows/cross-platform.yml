name: cross-platform

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Cross-compile test binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build (self-compile from committed build/mlrc)
        run: |
          chmod +x build/mlrc
          cat src/lexer.mlr src/ast.mlr src/parser.mlr src/codegen.mlr src/codegen_aarch64.mlr \
              src/ir.mlr src/ir_aarch64.mlr src/format_macho.mlr src/format_pe.mlr src/format_archive.mlr src/format_android.mlr \
              src/bcj.mlr src/analysis.mlr src/living.mlr src/runtime.mlr src/formatter.mlr src/main.mlr > build/mlrc.mlr
          # MLRift ships the bootstrap binary in-tree. Self-compile once so
          # CI is exercising a fresh binary, not the committed one.
          ./build/mlrc --arch=x86_64 build/mlrc.mlr -o build/mlrc.stable
          mv build/mlrc.stable build/mlrc
          chmod +x build/mlrc

      - name: Compile test programs for all platforms
        run: |
          mkdir -p /tmp/test-bins

          # Test programs
          echo 'fn main() { exit(42) }' > /tmp/exit42.mlr
          echo 'fn main() { uint64 msg = "Hello from MLRift!\n"; write(1, msg, 21); exit(0) }' > /tmp/hello.mlr
          echo 'fn fib(uint64 n) -> uint64 { if n <= 1 { return n }; return fib(n - 1) + fib(n - 2) }
          fn main() { exit(fib(10)) }' > /tmp/fib.mlr
          echo 'fn add(uint64 a, uint64 b) -> uint64 { return a + b }
          fn main() { exit(add(10, 32)) }' > /tmp/add.mlr
          echo 'static uint64 c = 0
          fn inc() { c = c + 1 }
          fn main() { inc(); inc(); inc(); exit(c) }' > /tmp/static.mlr

          # alloc test
          echo 'fn main() {
              uint64 buf = alloc(64)
              unsafe { *(buf as uint64) = 42 }
              uint64 v = 0
              unsafe { *(buf as uint64) -> v }
              exit(v)
          }' > /tmp/alloc_test.mlr

          # macOS x86_64
          for t in exit42 hello fib add static alloc_test; do
            ./build/mlrc --arch=x86_64 --emit=macho /tmp/$t.mlr -o /tmp/test-bins/macos-x64-$t
          done

          # macOS ARM64
          for t in exit42 hello fib add static alloc_test; do
            ./build/mlrc --arch=arm64 --emit=macho /tmp/$t.mlr -o /tmp/test-bins/macos-arm-$t
          done

          # Windows x86_64
          for t in exit42 hello fib add static; do
            ./build/mlrc --arch=x86_64 --emit=pe /tmp/$t.mlr -o /tmp/test-bins/win-x64-$t.exe
          done

          # Windows ARM64
          for t in exit42 hello fib add static; do
            ./build/mlrc --arch=arm64 --emit=pe /tmp/$t.mlr -o /tmp/test-bins/win-arm-$t.exe
          done

          # File I/O test (write + read back) with diagnostics
          cat > /tmp/fileio.mlr << 'KEOF'
          fn main() {
              println("1:open-write")
              uint64 wfd = file_open("mlrc_test_io.tmp", 1)
              print("2:wfd=")
              println(wfd)
              uint64 msg = "MLRift"
              file_write(wfd, msg, 8)
              println("3:wrote")
              file_close(wfd)
              println("4:closed")
              uint64 buf = alloc(64)
              println("5:alloc")
              uint64 rfd = file_open("mlrc_test_io.tmp", 0)
              print("6:rfd=")
              println(rfd)
              uint64 n = file_read(rfd, buf, 64)
              print("7:read=")
              println(n)
              file_close(rfd)
              exit(n)
          }
          KEOF
          ./build/mlrc --arch=x86_64 --emit=pe /tmp/fileio.mlr -o /tmp/test-bins/win-x64-fileio.exe
          ./build/mlrc --arch=arm64 --emit=pe /tmp/fileio.mlr -o /tmp/test-bins/win-arm-fileio.exe

          # macOS file I/O tests
          ./build/mlrc --arch=x86_64 --emit=macho /tmp/fileio.mlr -o /tmp/test-bins/macos-x64-fileio
          ./build/mlrc --arch=arm64 --emit=macho /tmp/fileio.mlr -o /tmp/test-bins/macos-arm-fileio

          # Cross-compile full compiler for self-compilation tests
          ./build/mlrc --arch=x86_64 --emit=pe build/mlrc.mlr -o /tmp/test-bins/mlrc-win-x64.exe
          ./build/mlrc --arch=arm64 --emit=pe build/mlrc.mlr -o /tmp/test-bins/mlrc-win-arm64.exe
          ./build/mlrc --arch=x86_64 --emit=macho build/mlrc.mlr -o /tmp/test-bins/mlrc-macos-x64
          cp build/mlrc.mlr /tmp/test-bins/mlrc-source.mlr

          # Build kr runners for each platform
          cat src/bcj.mlr src/runner.mlr > /tmp/mlr_src.mlr
          ./build/mlrc --arch=x86_64 --emit=pe    /tmp/mlr_src.mlr -o /tmp/test-bins/mlr-win-x64.exe
          ./build/mlrc --arch=arm64  --emit=pe    /tmp/mlr_src.mlr -o /tmp/test-bins/mlr-win-arm64.exe
          ./build/mlrc --arch=x86_64 --emit=macho /tmp/mlr_src.mlr -o /tmp/test-bins/mlr-macos-x64
          ./build/mlrc --arch=arm64  --emit=macho /tmp/mlr_src.mlr -o /tmp/test-bins/mlr-macos-arm64

          # Build a fat binary test program + ship the compiler's own
          # fat binary so the native-OS jobs can exercise fat-compile
          # determinism (Tier 1 #3 extended to the .mlrbo container).
          echo 'fn main() { exit(42) }' > /tmp/mlr_fat_test.mlr
          ./build/mlrc /tmp/mlr_fat_test.mlr -o /tmp/test-bins/mlr-test.mlrbo
          ./build/mlrc build/mlrc.mlr -o /tmp/test-bins/mlrc.mlrbo
          ls -la /tmp/test-bins/mlrc.mlrbo

          # Cross-compile the smoke corpus for every non-Linux target. The
          # native-OS jobs below consume these to make sure primitives like
          # alloc / file_read / file_size / time_ns actually work on real
          # hardware, not just the cross-compiler's output format.
          mkdir -p /tmp/test-bins/smoke
          : > /tmp/test-bins/smoke/manifest.txt
          for src in tests/smoke/*.mlr; do
            t="$(basename "$src" .mlr)"
            expected="$(grep -oE '// expected:[[:space:]]*[0-9]+' "$src" | head -1 | grep -oE '[0-9]+$')"
            expected="${expected:-0}"
            echo "$t $expected" >> /tmp/test-bins/smoke/manifest.txt
            ./build/mlrc --arch=x86_64 --emit=pe    "$src" -o "/tmp/test-bins/smoke/win-x64-$t.exe"
            ./build/mlrc --arch=arm64  --emit=pe    "$src" -o "/tmp/test-bins/smoke/win-arm-$t.exe"
            ./build/mlrc --arch=x86_64 --emit=macho "$src" -o "/tmp/test-bins/smoke/mac-x64-$t"
            ./build/mlrc --arch=arm64  --emit=macho "$src" -o "/tmp/test-bins/smoke/mac-arm-$t"
          done
          cat /tmp/test-bins/smoke/manifest.txt

          ls -la /tmp/test-bins/

      - name: Upload test binaries
        uses: actions/upload-artifact@v4
        with:
          name: test-bins
          path: /tmp/test-bins/

  test-macos-x64:
    name: macOS x86_64
    needs: build
    runs-on: macos-14
    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: test-bins
          path: bins

      - name: Run tests (capture to log)
        continue-on-error: true
        run: |
          mkdir -p debug-kit
          LOG=debug-kit/macos-x64-debug.log
          exec > >(tee -a "$LOG") 2>&1
          sw_vers
          PASS=0; FAIL=0
          run_test() {
            local name="$1" bin="$2" expected="$3"
            chmod +x "$bin"
            set +e
            OUTPUT=$("$bin" 2>&1)
            CODE=$?
            set -e
            if [ "$CODE" -eq "$expected" ]; then
              echo "PASS: $name (exit=$CODE)"
              PASS=$((PASS+1))
            else
              echo "FAIL: $name (expected=$expected, got=$CODE, output=$OUTPUT)"
              FAIL=$((FAIL+1))
            fi
          }
          run_test "exit42" bins/macos-x64-exit42 42
          run_test "hello"  bins/macos-x64-hello 0
          run_test "fib10"  bins/macos-x64-fib 55
          run_test "add"    bins/macos-x64-add 42
          run_test "static" bins/macos-x64-static 3
          run_test "alloc"  bins/macos-x64-alloc_test 42
          # Per-platform smoke corpus: alloc, file I/O, file_size, time_ns,
          # large frames, 9+-arg calls, deep recursion.
          while read -r name expected; do
            [ -z "$name" ] && continue
            bin="bins/smoke/mac-x64-$name"
            chmod +x "$bin" 2>/dev/null || true
            xattr -cr "$bin" 2>/dev/null || true
            set +e
            "$bin" > /dev/null 2>&1
            CODE=$?
            set -e
            if [ "$CODE" = "$expected" ]; then
              PASS=$((PASS+1)); echo "PASS: smoke.$name (exit=$CODE)"
            else
              FAIL=$((FAIL+1)); echo "FAIL: smoke.$name (expected=$expected, got=$CODE)"
            fi
          done < bins/smoke/manifest.txt
          echo "=== macOS x86_64: $PASS passed, $FAIL failed ==="
          echo $FAIL > debug-kit/fail-count.txt

      - name: Upload macOS x86_64 debug log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64-debug-log
          path: debug-kit/
          retention-days: 14

      - name: Report final status
        run: |
          FAIL=$(cat debug-kit/fail-count.txt 2>/dev/null || echo 1)
          if [ "$FAIL" != "0" ]; then
            echo "macOS x86_64 tests failed — download the 'macos-x64-debug-log' artifact"
            exit 1
          fi

      - name: Test file I/O on macOS (Rosetta)
        run: |
          chmod +x bins/macos-x64-fileio
          set +e; bins/macos-x64-fileio; CODE=$?; set -e
          if [ "$CODE" -eq 8 ]; then
            echo "PASS: macOS x86_64 file I/O (read 8 bytes)"
          else
            echo "FAIL: macOS x86_64 file I/O (expected 8, got $CODE)"
            exit 1
          fi

      - name: Fat binary runner (kr) on macOS
        run: |
          chmod +x bins/mlr-macos-x64
          set +e; bins/mlr-macos-x64 bins/mlr-test.mlrbo; CODE=$?; set -e
          if [ "$CODE" -eq 42 ]; then
            echo "PASS: kr runner (fat binary exit=42)"
          else
            echo "FAIL: kr runner (exit=$CODE)"
            exit 1
          fi

      - name: Self-compilation on macOS (Rosetta)
        run: |
          set +e
          chmod +x bins/mlrc-macos-x64
          echo 'fn main() { println("macOS self-compiled!"); exit(42) }' > test.mlr
          ./bins/mlrc-macos-x64 --arch=x86_64 --emit=macho test.mlr -o test_out 2>&1
          COMP=$?
          if [ "$COMP" -ne 0 ]; then echo "FAIL: compile (exit=$COMP)"; exit 1; fi
          chmod +x test_out
          ./test_out; CODE=$?
          if [ "$CODE" -eq 42 ]; then
            echo "PASS: macOS x86_64 self-compilation"
          else
            echo "FAIL: run exit=$CODE (expected 42)"
            exit 1
          fi

      - name: Full mlrc self-host fixed point (macOS x86_64 via Rosetta)
        run: |
          # mlrc3 → mlrc4 → mlrc5 on actual macOS hardware. mlrc4 == mlrc5
          # byte-equality is the real test; a 1-line exit(42) program
          # stresses almost none of the compiler's codegen surface.
          set +e
          chmod +x bins/mlrc-macos-x64
          ./bins/mlrc-macos-x64 --arch=x86_64 --emit=macho bins/mlrc-source.mlr -o mlrc4
          if [ $? -ne 0 ]; then echo "FAIL: mlrc4 compile"; exit 1; fi
          chmod +x mlrc4
          ./mlrc4 --arch=x86_64 --emit=macho bins/mlrc-source.mlr -o mlrc5
          if [ $? -ne 0 ]; then echo "FAIL: mlrc5 compile"; exit 1; fi
          chmod +x mlrc5
          if cmp -s mlrc4 mlrc5; then
            echo "PASS: macOS x86_64 fixed point ($(wc -c < mlrc4) bytes)"
          else
            echo "FAIL: macOS x86_64 fixed point — mlrc4 ($(wc -c < mlrc4)) != mlrc5 ($(wc -c < mlrc5))"
            exit 1
          fi

      - name: Fat-binary self-host determinism (macOS x86_64 via Rosetta)
        run: |
          # mlr-macos-x64 extracts the macOS x86_64 slice from mlrc.mlrbo
          # and runs it as a compile_fat driver. Two runs with the same
          # input must produce byte-identical output; drift here is
          # non-deterministic compression / BCJ filtering / fixup
          # ordering that only surfaces in the fat container.
          set +e
          chmod +x bins/mlr-macos-x64
          ./bins/mlr-macos-x64 bins/mlrc.mlrbo bins/mlrc-source.mlr -o /tmp/mlrc2.mlrbo
          if [ $? -ne 0 ]; then echo "FAIL: mlrc2.mlrbo compile"; exit 1; fi
          ./bins/mlr-macos-x64 /tmp/mlrc2.mlrbo bins/mlrc-source.mlr -o /tmp/mlrc3.mlrbo
          if [ $? -ne 0 ]; then echo "FAIL: mlrc3.mlrbo compile"; exit 1; fi
          s2=$(wc -c < /tmp/mlrc2.mlrbo); s3=$(wc -c < /tmp/mlrc3.mlrbo)
          if cmp -s /tmp/mlrc2.mlrbo /tmp/mlrc3.mlrbo; then
            echo "PASS: macOS x86_64 fat self-host determinism ($s2 bytes)"
          else
            echo "FAIL: macOS x86_64 fat self-host — mlrc2.mlrbo ($s2) != mlrc3.mlrbo ($s3)"
            exit 1
          fi

  test-macos-arm:
    name: macOS ARM64
    needs: build
    runs-on: macos-14
    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: test-bins
          path: bins

      - name: Run diagnostics and tests (capture everything to log)
        continue-on-error: true
        run: |
          set +e
          mkdir -p debug-kit
          LOG=debug-kit/macos-arm64-debug.log
          exec > >(tee -a "$LOG") 2>&1

          echo "=== macOS host info ==="
          sw_vers
          uname -a
          echo

          echo "=== clang reference binary (full load command dump) ==="
          echo 'int main() { return 42; }' > /tmp/ref.c
          clang -o /tmp/ref_arm64 /tmp/ref.c -arch arm64
          echo "ref build exit: $?"
          echo "--- all load commands of clang ref ---"
          otool -l /tmp/ref_arm64 2>&1
          echo "--- run reference ---"
          /tmp/ref_arm64; echo "ref exit: $?"
          echo "--- reference codesign verdict ---"
          codesign -dvvv /tmp/ref_arm64 2>&1 || true
          echo

          echo "=== our exit42 binary ==="
          chmod +x bins/macos-arm-exit42
          xattr -cr bins/ 2>/dev/null || true
          ls -la bins/macos-arm-exit42
          file bins/macos-arm-exit42
          echo "--- full load commands of our binary ---"
          otool -l bins/macos-arm-exit42 2>&1
          echo "--- signature before signing ---"
          codesign -dvvv bins/macos-arm-exit42 2>&1 || true
          echo "--- xattrs before signing ---"
          xattr -l bins/macos-arm-exit42 2>&1 || true
          echo "--- codesign (adhoc) ---"
          codesign -f -s - bins/macos-arm-exit42; echo "codesign: $?"
          codesign -vvv bins/macos-arm-exit42; echo "verify: $?"
          echo "--- codesign after signing ---"
          codesign -dvvv bins/macos-arm-exit42 2>&1 || true
          echo "--- spctl (Gatekeeper verdict) ---"
          spctl -a -vvv bins/macos-arm-exit42 2>&1 || true
          echo "--- dependencies ---"
          otool -L bins/macos-arm-exit42 || echo "(no deps)"
          echo
          echo "--- attempt 1: direct run ---"
          bins/macos-arm-exit42; echo "run exit: $?"
          echo
          echo "--- attempt 2: via 'arch -arm64' ---"
          arch -arm64 bins/macos-arm-exit42; echo "arch run exit: $?"
          echo
          echo "--- attempt 3: with hardened runtime ---"
          codesign -f -s - --options=runtime bins/macos-arm-exit42 2>&1 || true
          bins/macos-arm-exit42; echo "runtime run exit: $?"
          echo
          echo "--- attempt 4: re-sign and run with DYLD_* ---"
          codesign -f -s - bins/macos-arm-exit42 2>&1 || true
          DYLD_PRINT_APIS=1 DYLD_PRINT_LIBRARIES=1 bins/macos-arm-exit42 2>&1 | head -30; echo "dyld-print exit: $?"
          echo
          echo "--- last 2 min of kernel log (unfiltered) ---"
          sleep 2
          log show --predicate '(process == "kernel") AND (eventMessage CONTAINS "macos-arm" OR eventMessage CONTAINS "AMFI" OR eventMessage CONTAINS "codesigning" OR eventMessage CONTAINS "cs_invalid" OR eventMessage CONTAINS "SIGKILL")' --last 120s --style compact 2>&1 | tail -80
          echo
          echo "--- last 30s of ALL kernel log entries ---"
          log show --predicate 'process == "kernel"' --last 30s --style compact 2>&1 | tail -40
          echo

          echo "=== Running full test suite ==="
          PASS=0; FAIL=0
          run_test() {
            local name="$1" bin="$2" expected="$3"
            chmod +x "$bin"
            xattr -cr "$bin" 2>/dev/null || true
            codesign -f -s - "$bin" 2>/dev/null || true
            set +e
            OUTPUT=$("$bin" 2>&1)
            CODE=$?
            set -e
            if [ "$CODE" -eq "$expected" ]; then
              echo "PASS: $name (exit=$CODE)"
              PASS=$((PASS+1))
            else
              echo "FAIL: $name (expected=$expected, got=$CODE, output=$OUTPUT)"
              FAIL=$((FAIL+1))
            fi
          }
          run_test "exit42" bins/macos-arm-exit42 42
          run_test "hello"  bins/macos-arm-hello 0
          run_test "fib10"  bins/macos-arm-fib 55
          run_test "add"    bins/macos-arm-add 42
          run_test "static" bins/macos-arm-static 3
          run_test "alloc"  bins/macos-arm-alloc_test 42
          run_test "fileio" bins/macos-arm-fileio 8
          # Per-platform smoke corpus
          while read -r name expected; do
            [ -z "$name" ] && continue
            bin="bins/smoke/mac-arm-$name"
            chmod +x "$bin" 2>/dev/null || true
            xattr -cr "$bin" 2>/dev/null || true
            set +e
            "$bin" > /dev/null 2>&1
            CODE=$?
            set -e
            if [ "$CODE" = "$expected" ]; then
              PASS=$((PASS+1)); echo "PASS: smoke.$name (exit=$CODE)"
            else
              FAIL=$((FAIL+1)); echo "FAIL: smoke.$name (expected=$expected, got=$CODE)"
            fi
          done < bins/smoke/manifest.txt
          echo "=== macOS ARM64: $PASS passed, $FAIL failed ==="
          echo $FAIL > debug-kit/fail-count.txt

      - name: Upload macOS ARM64 debug log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-debug-log
          path: debug-kit/
          retention-days: 14

      - name: Report final status
        run: |
          FAIL=$(cat debug-kit/fail-count.txt 2>/dev/null || echo 1)
          if [ "$FAIL" != "0" ]; then
            echo "macOS ARM64 tests failed — download the 'macos-arm64-debug-log' artifact"
            exit 1
          fi

  test-windows-x64:
    name: Windows x86_64
    needs: build
    runs-on: windows-latest
    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: test-bins
          path: bins

      - name: Run tests
        shell: pwsh
        run: |
          $pass = 0; $fail = 0
          function Run-Test($name, $bin, $expected) {
            & $bin 2>$null
            $code = $LASTEXITCODE
            if ($code -eq $expected) {
              Write-Host "PASS: $name (exit=$code)"
              $script:pass++
            } else {
              Write-Host "FAIL: $name (expected=$expected, got=$code)"
              $script:fail++
            }
          }
          Run-Test "exit42" "bins\win-x64-exit42.exe" 42
          Run-Test "fib10"  "bins\win-x64-fib.exe" 55
          Run-Test "add"    "bins\win-x64-add.exe" 42
          Run-Test "static" "bins\win-x64-static.exe" 3
          Write-Host "=== Windows x86_64: $pass passed, $fail failed ==="
          exit $fail

      - name: Test hello world output
        shell: pwsh
        run: |
          $output = & bins\win-x64-hello.exe 2>&1
          if ($output -match "Hello from MLRift") {
            Write-Host "PASS: hello world output"
          } else {
            Write-Host "FAIL: hello world output: $output"
            exit 1
          }

      - name: Test file I/O (write + read back)
        shell: pwsh
        run: |
          $r = Start-Process -FilePath bins\win-x64-fileio.exe -Wait -PassThru -NoNewWindow
          if ($r.ExitCode -eq 8) {
            Write-Host "PASS: file I/O (read back 8 bytes)"
          } else {
            Write-Host "FAIL: file I/O (expected 8, got $($r.ExitCode))"
            exit 1
          }

      - name: Smoke suite (Windows x86_64 native)
        shell: pwsh
        run: |
          $fail = 0
          Get-Content bins\smoke\manifest.txt | ForEach-Object {
            $parts = $_ -split ' +'
            if ($parts.Length -lt 2) { return }
            $name = $parts[0]; $expected = [int]$parts[1]
            $bin = "bins\smoke\win-x64-$name.exe"
            $r = Start-Process -FilePath $bin -Wait -PassThru -NoNewWindow
            if ($r.ExitCode -eq $expected) {
              Write-Host "PASS: smoke.$name (exit=$($r.ExitCode))"
            } else {
              Write-Host "FAIL: smoke.$name (expected=$expected, got=$($r.ExitCode))"
              $fail++
            }
          }
          if ($fail -gt 0) { exit 1 }

      - name: Fat binary runner (kr) on Windows
        shell: pwsh
        run: |
          $r = Start-Process -FilePath bins\mlr-win-x64.exe -ArgumentList 'bins\mlr-test.mlrbo' -Wait -PassThru -NoNewWindow
          if ($r.ExitCode -eq 42) {
            Write-Host "PASS: kr runner (fat binary exit=42)"
          } else {
            Write-Host "FAIL: kr runner (exit=$($r.ExitCode))"
            exit 1
          }

      - name: Self-compilation on Windows
        shell: pwsh
        run: |
          $r1 = Start-Process -FilePath bins\mlrc-win-x64.exe -ArgumentList '--emit=pe','bins\mlrc-source.mlr','-o','mlrc-self1.exe' -Wait -PassThru -NoNewWindow
          if ($r1.ExitCode -ne 0) { Write-Host "FAIL: self-compile stage 1 (exit=$($r1.ExitCode))"; exit 1 }
          Write-Host "Stage 1: OK (compiled on Windows)"

          Set-Content -Path test.mlr -Value 'fn main() { println("self-compiled!"); exit(42) }'
          $r2 = Start-Process -FilePath .\mlrc-self1.exe -ArgumentList '--emit=pe','test.mlr','-o','test-self.exe' -Wait -PassThru -NoNewWindow
          if ($r2.ExitCode -ne 0) { Write-Host "FAIL: self-compile stage 2 (exit=$($r2.ExitCode))"; exit 1 }

          $r3 = Start-Process -FilePath .\test-self.exe -Wait -PassThru -NoNewWindow
          if ($r3.ExitCode -eq 42) {
            Write-Host "PASS: Windows self-compilation chain"
          } else {
            Write-Host "FAIL: test-self.exe exit=$($r3.ExitCode) (expected 42)"
            exit 1
          }

      - name: Bootstrap fixed point on Windows x86_64
        shell: pwsh
        run: |
          # mlrc-self1 was built on Windows by the cross-compiled mlrc3.
          # Now have mlrc-self1 compile the source again → mlrc-self2.
          # If the Windows-native codegen is deterministic, mlrc-self1
          # and mlrc-self2 must be byte-identical. Drift here would
          # point at non-deterministic PE emission (timestamp-like
          # fields, uninitialised header bytes).
          $r = Start-Process -FilePath .\mlrc-self1.exe -ArgumentList '--emit=pe','bins\mlrc-source.mlr','-o','mlrc-self2.exe' -Wait -PassThru -NoNewWindow
          if ($r.ExitCode -ne 0) { Write-Host "FAIL: self-compile stage 2 (exit=$($r.ExitCode))"; exit 1 }
          $h1 = (Get-FileHash -Algorithm MD5 mlrc-self1.exe).Hash
          $h2 = (Get-FileHash -Algorithm MD5 mlrc-self2.exe).Hash
          $s1 = (Get-Item mlrc-self1.exe).Length
          $s2 = (Get-Item mlrc-self2.exe).Length
          if ($h1 -eq $h2) {
            Write-Host "PASS: Windows x86_64 fixed point ($s1 bytes, md5=$h1)"
          } else {
            Write-Host "FAIL: Windows x86_64 fixed point — mlrc-self1 ($s1, $h1) != mlrc-self2 ($s2, $h2)"
            exit 1
          }

      - name: Fat-binary self-host determinism (Windows x86_64)
        shell: pwsh
        run: |
          # mlr-win-x64.exe extracts the Windows x86_64 slice from
          # mlrc.mlrbo and execs it with the caller's argv forwarded as
          # a quoted cmdline (see exec_process_argv Windows branch).
          # Two compile_fat runs with identical input must produce
          # byte-identical .mlrbo output.
          $r = Start-Process -FilePath bins\mlr-win-x64.exe -ArgumentList 'bins\mlrc.mlrbo','bins\mlrc-source.mlr','-o','mlrc2.mlrbo' -Wait -PassThru -NoNewWindow
          if ($r.ExitCode -ne 0) { Write-Host "FAIL: mlrc2.mlrbo compile (exit=$($r.ExitCode))"; exit 1 }
          $r = Start-Process -FilePath bins\mlr-win-x64.exe -ArgumentList 'bins\mlrc.mlrbo','bins\mlrc-source.mlr','-o','mlrc3.mlrbo' -Wait -PassThru -NoNewWindow
          if ($r.ExitCode -ne 0) { Write-Host "FAIL: mlrc3.mlrbo compile (exit=$($r.ExitCode))"; exit 1 }
          $h2 = (Get-FileHash -Algorithm MD5 mlrc2.mlrbo).Hash
          $h3 = (Get-FileHash -Algorithm MD5 mlrc3.mlrbo).Hash
          $s2 = (Get-Item mlrc2.mlrbo).Length
          $s3 = (Get-Item mlrc3.mlrbo).Length
          if ($h2 -eq $h3) {
            Write-Host "PASS: Windows x86_64 fat self-host determinism ($s2 bytes, md5=$h2)"
          } else {
            Write-Host "FAIL: Windows x86_64 fat self-host — mlrc2.mlrbo ($s2, $h2) != mlrc3.mlrbo ($s3, $h3)"
            exit 1
          }

  test-windows-arm64:
    name: Windows ARM64
    needs: build
    runs-on: windows-11-arm
    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: test-bins
          path: bins

      - name: Run tests
        shell: pwsh
        run: |
          $pass = 0; $fail = 0
          function Run-Test($name, $bin, $expected) {
            $r = Start-Process -FilePath $bin -Wait -PassThru -NoNewWindow
            $code = $r.ExitCode
            if ($code -eq $expected) {
              Write-Host "PASS: $name (exit=$code)"
              $script:pass++
            } else {
              Write-Host "FAIL: $name (expected=$expected, got=$code)"
              $script:fail++
            }
          }
          Run-Test "exit42" "bins\win-arm-exit42.exe" 42
          Run-Test "fib10"  "bins\win-arm-fib.exe" 55
          Run-Test "add"    "bins\win-arm-add.exe" 42
          Run-Test "static" "bins\win-arm-static.exe" 3
          Write-Host "=== Windows ARM64: $pass passed, $fail failed ==="
          exit $fail

      - name: Test hello world output
        shell: pwsh
        run: |
          $output = & bins\win-arm-hello.exe 2>&1
          if ($output -match "Hello from MLRift") {
            Write-Host "PASS: hello world output"
          } else {
            Write-Host "FAIL: hello world output: $output"
            exit 1
          }

      - name: Test file I/O (write + read back)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $r = Start-Process -FilePath bins\win-arm-fileio.exe -Wait -PassThru -NoNewWindow
          if ($r.ExitCode -eq 8) {
            Write-Host "PASS: file I/O (read back 8 bytes)"
          } else {
            Write-Host "FAIL: file I/O (expected 8, got $($r.ExitCode))"
            exit 1
          }

      - name: Smoke suite (Windows ARM64 native)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $fail = 0
          Get-Content bins\smoke\manifest.txt | ForEach-Object {
            $parts = $_ -split ' +'
            if ($parts.Length -lt 2) { return }
            $name = $parts[0]; $expected = [int]$parts[1]
            $bin = "bins\smoke\win-arm-$name.exe"
            $r = Start-Process -FilePath $bin -Wait -PassThru -NoNewWindow
            if ($r.ExitCode -eq $expected) {
              Write-Host "PASS: smoke.$name (exit=$($r.ExitCode))"
            } else {
              Write-Host "FAIL: smoke.$name (expected=$expected, got=$($r.ExitCode))"
              $fail++
            }
          }
          if ($fail -gt 0) { exit 1 }

      - name: Self-compilation on Windows ARM64
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          Set-Content -Path test.mlr -Encoding ascii -Value 'fn main() { println("ARM64 self-compiled!"); exit(42) }'

          # Stage 1: cross-compiled compiler (mlrc3) compiles test program
          $r1 = Start-Process -FilePath bins\mlrc-win-arm64.exe -ArgumentList '--emit=pe','test.mlr','-o','test-s1.exe' -Wait -PassThru -NoNewWindow
          if ($r1.ExitCode -ne 0) { Write-Host "FAIL: stage 1 compile (exit=$($r1.ExitCode))"; exit 1 }
          $r1r = Start-Process -FilePath .\test-s1.exe -Wait -PassThru -NoNewWindow
          if ($r1r.ExitCode -ne 42) { Write-Host "FAIL: stage 1 run (exit=$($r1r.ExitCode))"; exit 1 }
          Write-Host "Stage 1: PASS (mlrc3 compiles test, runs with exit 42)"

          # Stage 2: mlrc3 self-compiles to mlrc4
          $r2 = Start-Process -FilePath bins\mlrc-win-arm64.exe -ArgumentList '--emit=pe','bins\mlrc-source.mlr','-o','mlrc4.exe' -Wait -PassThru -NoNewWindow
          if ($r2.ExitCode -ne 0) { Write-Host "FAIL: stage 2 self-compile (exit=$($r2.ExitCode))"; exit 1 }
          Write-Host "Stage 2: PASS (mlrc3 self-compiled to mlrc4, $((Get-Item mlrc4.exe).Length) bytes)"

          # Stage 3: mlrc4 compiles the same test program
          $r3 = Start-Process -FilePath .\mlrc4.exe -ArgumentList '--emit=pe','test.mlr','-o','test-s3.exe' -Wait -PassThru -NoNewWindow
          if ($r3.ExitCode -ne 0) { Write-Host "FAIL: stage 3 compile (exit=$($r3.ExitCode))"; exit 1 }
          $r3r = Start-Process -FilePath .\test-s3.exe -Wait -PassThru -NoNewWindow
          if ($r3r.ExitCode -ne 42) { Write-Host "FAIL: stage 3 run (exit=$($r3r.ExitCode))"; exit 1 }
          Write-Host "Stage 3: PASS (mlrc4 compiles test, runs with exit 42)"

          # Stage 4: compare test-s1 and test-s3 output (the tiny test program
          # compiled by mlrc3 vs mlrc4). Won't always match because mlrc3 was
          # cross-compiled on Linux and mlrc4 was self-compiled on Windows, but
          # if they DO match that's a nice confirmation.
          $h1 = (Get-FileHash test-s1.exe).Hash
          $h3 = (Get-FileHash test-s3.exe).Hash
          if ($h1 -eq $h3) {
            Write-Host "PASS: mlrc3 and mlrc4 produce identical output (bootstrap verified)"
          } else {
            Write-Host "INFO: mlrc3 and mlrc4 output differs (expected — different compiler binaries)"
          }

          # Stage 5: true fixed point. mlrc4 self-compiles → mlrc5.
          # Both were built on this Windows-arm64 host with arm64-PE
          # codegen, so mlrc4 and mlrc5 must be byte-identical if the
          # emitter is deterministic. This is the check that catches
          # any PE-header non-determinism (timestamps, padding, etc.)
          # specific to the arm64 path.
          $r5 = Start-Process -FilePath .\mlrc4.exe -ArgumentList '--emit=pe','bins\mlrc-source.mlr','-o','mlrc5.exe' -Wait -PassThru -NoNewWindow
          if ($r5.ExitCode -ne 0) { Write-Host "FAIL: stage 5 self-compile (exit=$($r5.ExitCode))"; exit 1 }
          $h4 = (Get-FileHash -Algorithm MD5 mlrc4.exe).Hash
          $h5 = (Get-FileHash -Algorithm MD5 mlrc5.exe).Hash
          $s4 = (Get-Item mlrc4.exe).Length
          $s5 = (Get-Item mlrc5.exe).Length
          if ($h4 -eq $h5) {
            Write-Host "PASS: Windows ARM64 fixed point ($s4 bytes, md5=$h4)"
          } else {
            Write-Host "FAIL: Windows ARM64 fixed point — mlrc4 ($s4, $h4) != mlrc5 ($s5, $h5)"
            exit 1
          }

      - name: Fat-binary self-host determinism (Windows ARM64)
        shell: pwsh
        run: |
          # mlr-win-arm64.exe extracts the Windows ARM64 slice from
          # mlrc.mlrbo and execs it with the caller's argv forwarded as
          # a quoted cmdline. Two compile_fat runs with identical
          # input must produce byte-identical .mlrbo output.
          $r = Start-Process -FilePath bins\mlr-win-arm64.exe -ArgumentList 'bins\mlrc.mlrbo','bins\mlrc-source.mlr','-o','mlrc2.mlrbo' -Wait -PassThru -NoNewWindow
          if ($r.ExitCode -ne 0) { Write-Host "FAIL: mlrc2.mlrbo compile (exit=$($r.ExitCode))"; exit 1 }
          $r = Start-Process -FilePath bins\mlr-win-arm64.exe -ArgumentList 'bins\mlrc.mlrbo','bins\mlrc-source.mlr','-o','mlrc3.mlrbo' -Wait -PassThru -NoNewWindow
          if ($r.ExitCode -ne 0) { Write-Host "FAIL: mlrc3.mlrbo compile (exit=$($r.ExitCode))"; exit 1 }
          $h2 = (Get-FileHash -Algorithm MD5 mlrc2.mlrbo).Hash
          $h3 = (Get-FileHash -Algorithm MD5 mlrc3.mlrbo).Hash
          $s2 = (Get-Item mlrc2.mlrbo).Length
          $s3 = (Get-Item mlrc3.mlrbo).Length
          if ($h2 -eq $h3) {
            Write-Host "PASS: Windows ARM64 fat self-host determinism ($s2 bytes, md5=$h2)"
          } else {
            Write-Host "FAIL: Windows ARM64 fat self-host — mlrc2.mlrbo ($s2, $h2) != mlrc3.mlrbo ($s3, $h3)"
            exit 1
          }
